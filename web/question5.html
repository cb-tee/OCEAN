<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Psychology Test</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Tahoma', sans-serif;
            background-image: url('UI3.png'); 
            background-size: cover;
            background-position: center;
            display: flex; justify-content: center; align-items: center;
        }

        .quiz-container {
            width: 550px; height: 800px; 
            background-image: url('ui-box.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: relative; 
        }

        .header-section {
            position: absolute; top: 155px; left: 112px;
            width: 325px; display: flex; align-items: center; justify-content: space-between;
        }
        .progress-container {
            width: 80%; height: 12px; background: rgba(255, 255, 255, 0.5);
            border-radius: 10px; overflow: hidden;
        }
        .progress-bar { height: 100%; background-color: #8DA9D4; width: 0%; transition: width 0.3s ease; }
        .percentage-text { font-size: 14px; font-weight: bold; color: #5D7BA8; }

        #question-text {
            position: absolute; top: 215px; left: 105px;
            width: 340px; height: 140px;
            display: flex; align-items: center; justify-content: center;
            text-align: center; font-size: 18px; font-weight: bold; color: #5D7BA8; line-height: 1.4;
        }

        .options-container {
            position: absolute; top: 370px; left: 105px;
            width: 340px; display: flex; flex-direction: column; gap: 20px;
        }
        .option-btn {
            background: transparent; border: none; height: 62px; 
            cursor: pointer; font-size: 16px; color: #5D7BA8; font-weight: 500;
            text-align: center;
        }
        .option-btn:hover { background-color: rgba(255, 255, 255, 0.4); border-radius: 15px; }

        .result-screen {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); text-align: center; width: 300px;
        }

        #next-image-btn {
            display: none;
            position: absolute;
            bottom: 75px;
            right: 90px;
            cursor: pointer;
            width: 350px;
            transition: transform 0.2s;
        }
        #next-image-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div class="header-section">
            <div class="progress-container"><div class="progress-bar" id="myBar"></div></div>
            <div class="percentage-text" id="percentNum">0%</div>
        </div>

        <div id="question-content">
            <div id="question-text"></div>
            <div class="options-container" id="options"></div>
        </div>

        <div class="result-screen" id="result-screen">
            <h2 style="color: #5D7BA8;">ทำครบ 100% แล้ว!</h2>
            <p id="score-display" style="color: #5D7BA8; font-weight: bold;"></p>
            <p style="color: #8DA9D4; font-size: 14px; cursor: pointer; text-decoration: underline;" onclick="location.reload()">ทำอีกรอบ</p>
        </div>

        <img src="next-button.png" id="next-image-btn" alt="Next" onclick="goToNextPage()">
    </div>

<script>
    // แก้ไข Syntax ตรงนี้
    const questions = [
        { 
            q: "คุณส่งข้อความไปหาแฟนของคุณแต่เขาอ่านแล้วไม่ตอบนานกว่า4ชั่วโมง คุณจะคิดยังไง?", 
            a: [
                {text: "เขาอาจจะแค่ไม่ว่างคุยกับเราเฉยๆก็ได้", score: 2}, 
                {text: "เริ่มคิดทบทวนว่าตัวเองทำอะไรผิดรึเปล่าหรือคิดว่าเขาโกธร ไม่อยากคุยด้วย", score: 4}, 
                {text: "เริ่มกังวลว่าอีกฝ่ายเป็นอะไรรึเปล่า", score: 3}, 
                {text: "เขาอาจจะแค่ยุ่งก็ได้ ไม่ต้องคิดอะไรมาก", score: 1}
            ] 
        },
        { 
            q: "เมื่อคุณวางแผนงานไว้อย่างพิถีพิถันแต่มันดันไม่เป็นไปตามแผนของคุณ ความรู้สึกของคุณจะเป็นยังไง?", 
            a: [
                {text: "รู้สึกกระวนกระวาย เครียด วุ่นวายอยู่ในใจแม้จะแก้ปัญหาเสร็จไปแล้ว", score: 4}, // ลบ : หน้า score และ , หลังปีกกา
                {text: "รู้สึกหงุดหงิดเล็กๆที่ไม่เป็นไปตามแผนจะโล่งใจเมื่อแก้ปัญหาเสร็จ", score: 2}, 
                {text: "รู้สึกกระวนกระวายนิดหน่อยแต่ก็ต้องรีบแก้ปัญหา", score: 3}, 
                {text: "เครียดนิดๆแต่ก็รีบแก้ปัญหา", score: 1}
            ] 
        },
        { 
            q: "คุณพรีเซ็นต์งานของคุณจบแล้ว ส่วนใหญ่ราบรื่นดี มีจุดเล็กๆที่คุณพูดผิด แต่ไม่มีใครสนใจ คุณจะรู้สึกยังไงกับความผิดพลาดเล็กๆนั้น?", 
            a: [
                {text: "ไม่คิดอะไร เพราะเป็นแค่จุดเล็กๆ", score: 1}, 
                {text: "คิดเกี่ยวกับจุดนั้นอยู่สักพักก่อนจะปล่อยผ่านไป", score: 3},       
                {text: "ไม่คิดอะไรแต่ก็แอบอายๆบ้าง", score: 2}, 

                {text: "เก็บคำพูดที่ผิดนั้นมาคิดซ้ำไปซ้ำมาตลอดทั้งวัน แม้จะไม่มีใครใส่ใจก็ตาม", score: 4},
            ] 
        }
    ];

    let currentQuestion = 0;
    let totalScore = 0;

    function showQuestion() {
        const q = questions[currentQuestion];
        document.getElementById("question-text").innerText = q.q;
        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = ""; 

        q.a.forEach((answer) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = answer.text;
            btn.onclick = () => nextQuestion(answer.score); 
            optionsDiv.appendChild(btn);
        });
        updateProgress();
    }

    function nextQuestion(points) {
        totalScore += points;
        currentQuestion++;
        if (currentQuestion < questions.length) {
            showQuestion();
        } else {
            updateProgress();
            showResult();
        }
    }

    function updateProgress() {
        let percent = Math.round((currentQuestion / questions.length) * 100);
        document.getElementById("myBar").style.width = percent + "%";
        document.getElementById("percentNum").innerText = percent + "%";
    }

    function showResult() {
        document.getElementById("question-content").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        document.getElementById("score-display").innerText = "คะแนนของคุณคือ: " + totalScore;
        document.getElementById("next-image-btn").style.display = "block";
   
        localStorage.setItem("p5", totalScore);
        
        document.getElementById("next-image-btn").style.display = "block";
    }

    function goToNextPage() {
        window.location.href = "conclusion5.html?score=" + totalScore;   
    }

    // เริ่มทำงาน
    showQuestion();
</script>
</body>
</html>
