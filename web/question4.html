<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Psychology Test</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Tahoma', sans-serif;
            background-image: url('UI3.png'); 
            background-size: cover;
            background-position: center;
            display: flex; justify-content: center; align-items: center;
        }

        .quiz-container {
            width: 550px; height: 800px; 
            background-image: url('ui-box.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: relative; 
        }

        /* ส่วนความคืบหน้า (Progress) */
        .header-section {
            position: absolute; top: 155px; left: 112px;
            width: 325px; display: flex; align-items: center; justify-content: space-between;
        }
        .progress-container {
            width: 80%; height: 12px; background: rgba(255, 255, 255, 0.5);
            border-radius: 10px; overflow: hidden;
        }
        .progress-bar { height: 100%; background-color: #8DA9D4; width: 0%; transition: width 0.3s ease; }
        .percentage-text { font-size: 14px; font-weight: bold; color: #5D7BA8; }

        /* คำถาม */
        #question-text {
            position: absolute; top: 215px; left: 105px;
            width: 340px; height: 140px;
            display: flex; align-items: center; justify-content: center;
            text-align: center; font-size: 18px; font-weight: bold; color: #5D7BA8; line-height: 1.4;
        }

        /* ปุ่มคำตอบ (Transparent) */
        .options-container {
            position: absolute; top: 370px; left: 105px;
            width: 340px; display: flex; flex-direction: column; gap: 20px;
        }
        .option-btn {
            background: transparent; border: none; height: 62px; 
            cursor: pointer; font-size: 16px; color: #5D7BA8; font-weight: 500;
        }
        .option-btn:hover { background-color: rgba(255, 255, 255, 0.4); border-radius: 15px; }

        /* หน้าผลลัพธ์ */
        .result-screen {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); text-align: center; width: 300px;
        }

        /* ปุ่ม Next (รูปภาพ) วางตำแหน่งมุมขวาล่างตามรูปวาด */
        #next-image-btn {
            display: none; /* ซ่อนไว้ก่อนจนกว่าจะทำครบ */
            position: absolute;
            bottom: 75px; /* ปรับค่านี้ให้ตรงกับรูปวาดของคุณ */
            right: 90px;
            cursor: pointer;
            width: 350px; /* ปรับขนาดตามต้องการ */
            transition: transform 0.2s;
        }
        #next-image-btn:hover { transform: scale(1.05); }
        #next-image-btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <div class="quiz-container">
        <div class="header-section">
            <div class="progress-container"><div class="progress-bar" id="myBar"></div></div>
            <div class="percentage-text" id="percentNum">0%</div>
        </div>

        <div id="question-content">
            <div id="question-text"></div>
            <div class="options-container" id="options"></div>
        </div>

        <div class="result-screen" id="result-screen">
            <h2 style="color: #5D7BA8;">ทำครบ 100% แล้ว!</h2>
            <p id="score-display" style="color: #5D7BA8; font-weight: bold;"></p>
            <p style="color: #8DA9D4; font-size: 14px; cursor: pointer; text-decoration: underline;" onclick="location.reload()">ทำอีกรอบ</p>
        </div>

        <img src="next-button.png" id="next-image-btn" alt="Next" onclick="goToNextPage()">
    </div>

<script>
    const questions = [
        { q: "หากเพื่อนร่วมงานของคุณทำผิดพลาดส่งผลกระทบต่องานที่ทำส่วนร่วม คุณจะทำยังไง?", a: [{text: "ให้เพื่อนร่วมงานคนนั้นแก้ไขงานส่วนที่เขาทำพลาดคนเดียวแถมต่อว่าเขาจะได้ไม่ทำผิดอีก", score: 2}, {text: "เข้าไปช่วยแก้งานในส่วนนั้นเก็บความหงุดหงิดไว้ในใจ", score: 3}, {text: "เข้าไปช่วยแก้ไขและให้กำลังใจ โดยพยายามไม่ต่อว่าเพื่อนคนนั้น", score: 4}, {text: "ต่อว่าเพื่อนร่วมงานเป็นอย่างแรก และตัดชื่อเพื่อนร่วมงานออกจากโปรเจกต์", score: 1}] },
        { q: "เพื่อนๆในกลุ่มของคุณตัดสินใจไปร้านอาหารที่คุณไม่ชอบเลยแต่เพื่อนๆอยากให้คุณไปด้วย คุณจะทำยังไง?", a: [{text: "ยอมไปด้วย พยายามหาเมนูที่พอกินได้ เพื่อให้เพื่อนมีความสุข", score: 4}, {text: "ยอมไปด้วยแต่แค่ไปนั่งคุยด้วยเฉยๆ ไม่ได้สั่งอาหาร", score: 3}, {text: "ปฎิเสธเพื่อนไปแบบงอนๆนิดหน่อย", score: 2}, {text: "ตอบว่าไม่ไปแบบเสียงแข็ง", score: 1}] },
        { q: "คุณนั่งอ่านหนังสือในห้องสมุด จู่ๆมีคนแปลกหน้ามาขอให้คุณช่วยจัดหนังสือเล็กๆน้อยๆ คุณจะทำยังไง?", a: [{text: "ไม่ช่วย เพราะแค่หนังสือไม่กี่เล่มเองเก็บคนเดียวได้อยู่แล้ว ", score: 2}, {text: "ตกลงช่วยแต่ไม่ได้เต็มใจขนาดนั้น", score: 3}, {text: "ไม่ช่วยแล้วอ้างว่ากำลังยุ่งอยู่", score: 1}, {text: "ยินดีช่วยเหลือทันทีที่เขาขอเพราะรู้สึกเห็นใจ", score: 4}] }
    ];

    let currentQuestion = 0;
    let totalScore = 0;

    function showQuestion() {
        const q = questions[currentQuestion];
        document.getElementById("question-text").innerText = q.q;
        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = ""; 

        q.a.forEach((answer) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = answer.text;
            btn.onclick = () => nextQuestion(answer.score); 
            optionsDiv.appendChild(btn);
        });
        updateProgress();
    }

    function nextQuestion(points) {
        totalScore += points;
        currentQuestion++;
        if (currentQuestion < questions.length) {
            showQuestion();
        } else {
            updateProgress();
            showResult();
        }
    }

    function updateProgress() {
        let percent = Math.round((currentQuestion / questions.length) * 100);
        document.getElementById("myBar").style.width = percent + "%";
        document.getElementById("percentNum").innerText = percent + "%";
    }

    function showResult() {
        document.getElementById("question-content").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        document.getElementById("score-display").innerText = "คะแนนของคุณคือ: " + totalScore;

        localStorage.setItem("p4", totalScore);
        
        document.getElementById("next-image-btn").style.display = "block";
    }
      
    function goToNextPage() {
        window.location.href = "conclusion4.html?score=" + totalScore;   
    }

    showQuestion();
</script>
</body>
</html>
